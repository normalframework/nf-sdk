# Copy to mapping.yaml and set real NF point UUIDs (Object Explorer → export cURL / point query).
# Brick keys must match the `brick:` classes in your Open-FDD YAML rules.

nf:
  base_url: "http://localhost:8080"
  # Optional OAuth (same env vars as nf-sdk examples: NF_CLIENT_ID, NF_CLIENT_SECRET)
  # Or use basic: NF_BASIC_USER=user:pass

fetch:
  lookback_hours: 24
  resample_method: "AVERAGE"
  resample_window: "900s"

run:
  # Docker image: /app/rules. Local: absolute path to this folder's rules/, e.g. /path/to/open-fdd-rules-engine/rules
  rules_dir: "/app/rules"
  poll_interval_seconds: 300
  once: false

# Map Open-FDD Brick class name → Normal Framework point UUID
point_uuids:
  Outside_Air_Temperature_Sensor: "00000000-0000-0000-0000-000000000001"
  Supply_Air_Temperature_Sensor: "00000000-0000-0000-0000-000000000002"
