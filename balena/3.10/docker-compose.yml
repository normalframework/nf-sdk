version: "2.1"

volumes:
  redis-db:
  nf-var:

services:
  redis:
    image: normalframework.azurecr.io/normalframework/redis:3.10.0-0
    ports:
      - "6379:6379"
    volumes:
      - "redis-db:/data"

  nf:
    image: normalframework.azurecr.io/normalframework/nf-full:3.10.0-0
    network_mode: host
    privileged: true
    environment:
      - PORT=80
      - DBUS_SYSTEM_BUS_ADDRESS=unix:path=/host/run/dbus/system_bus_socket
    depends_on:
      - redis
    volumes:
      - "nf-var:/var/nf"
    labels:
      io.balena.features.dbus: '1'

